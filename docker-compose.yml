services:
  mysql:
    image: mysql:8.4
    container_name: webdesign_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-webdesign}
      MYSQL_USER: ${MYSQL_USER:-webdesign}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-webdesign}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontoffice:
    build:
      context: ./FrontOffice
    container_name: webdesign_frontoffice
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      APP_ENV: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-webdesign}
      DB_USER: ${MYSQL_USER:-webdesign}
      DB_PASSWORD: ${MYSQL_PASSWORD:-webdesign}
    volumes:
      - ./FrontOffice/src:/var/www/html

  backoffice:
    build:
      context: ./BackOffice
    container_name: webdesign_backoffice
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      APP_ENV: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-webdesign}
      DB_USER: ${MYSQL_USER:-webdesign}
      DB_PASSWORD: ${MYSQL_PASSWORD:-webdesign}
    volumes:
      - ./BackOffice/src:/var/www/html

volumes:
  mysql_data:
